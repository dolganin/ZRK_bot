services:
  bot:
    network_mode: "container:TalosClaudeVPN"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL_VPN:-postgresql+asyncpg://postgres:postgres@host.docker.internal:5432/career_quest}
      REDIS_URL: ${REDIS_URL_VPN:-redis://host.docker.internal:6379/0}
